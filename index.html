<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:#000; color:#e0aaff; font-family:sans-serif; text-align:center; padding:10px; margin:0; }
.box { max-width:420px; margin:0 auto 15px; padding:20px; border:1px solid #7b2cbf; border-radius:15px; background:#000; }
button { background:#000; border:1px solid #9d4edd; color:#9d4edd; padding:10px; border-radius:8px; cursor:pointer; width:100%; margin-top:5px; }
input { width:85%; padding:10px; margin:5px 0; border-radius:5px; border:1px solid #5a189a; background:#000; color:#fff; text-align:center; }
.purp{ color:#d699ff; font-weight:bold; }
table{ width:100%; margin-top:10px; border-collapse:collapse; }
td,th{ padding:8px; border-bottom:1px solid #1a1a1a; }
</style>
</head>
<body>

<h2>СТАВКИ НА НИКОЛАЯ</h2>

<div class="box">
<div id="authBlock">
<input type="text" id="loginInput" placeholder="Никнейм">
<input type="password" id="passInput" placeholder="Пароль">
<button onclick="loginUser()">ВОЙТИ</button>
<button onclick="registerUser()">РЕГИСТРАЦИЯ</button>
</div>

<div id="userBlock" style="display:none;">
Игрок: <span id="username" class="purp"></span><br>
Баланс: <span id="balance" class="purp"></span> 💰
<button onclick="logout()">ВЫЙТИ</button>
</div>
</div>

<script>
const DB="https://nikolay-40916-default-rtdb.firebaseio.com/.json";
let db={ users:{} };
let currentUser=null;

function generateToken(){
return crypto.randomUUID();
}

function getToken(){
return new URLSearchParams(location.search).get("token");
}

function setToken(t){
history.replaceState({},'',"?token="+t);
}

async function loadDB(){
const r=await fetch(DB+"?t="+Date.now());
const data=await r.json();
if(data) db=data;
}

async function saveDB(){
await fetch(DB,{method:"PUT",body:JSON.stringify(db)});
}

async function registerUser(){
const login=document.getElementById("loginInput").value.trim();
const pass=document.getElementById("passInput").value.trim();
if(!login || !pass) return alert("Заполни поля");

await loadDB();

if(db.users[login]) return alert("Пользователь уже существует");

const token=generateToken();

db.users[login]={
pass:pass,
balance:1000,
token:token
};

await saveDB();

setToken(token);
enterAccount(login);
}

async function loginUser(){
const login=document.getElementById("loginInput").value.trim();
const pass=document.getElementById("passInput").value.trim();
if(!login || !pass) return alert("Заполни поля");

await loadDB();

if(!db.users[login]) return alert("Нет такого пользователя");
if(db.users[login].pass!==pass) return alert("Неверный пароль");

const token=generateToken();
db.users[login].token=token;

await saveDB();

setToken(token);
enterAccount(login);
}

function enterAccount(login){
currentUser=login;
document.getElementById("authBlock").style.display="none";
document.getElementById("userBlock").style.display="block";
document.getElementById("username").innerText=login;
document.getElementById("balance").innerText=db.users[login].balance;
}

function logout(){
location.href=location.pathname;
}

window.onload=async()=>{
await loadDB();

const token=getToken();
if(!token) return;

const found=Object.entries(db.users)
.find(([name,data])=>data.token===token);

if(found){
enterAccount(found[0]);
}
};
</script>

</body>
</html>
